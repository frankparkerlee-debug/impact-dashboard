# Render infrastructure-as-code. Cloning this is how future client portals deploy in one step.
databases:
  - name: impact-portal-db
    plan: basic-256mb
    region: oregon

services:
  - type: web
    name: impact-dashboard
    runtime: node
    region: oregon
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: impact-portal-db
          property: connectionString
      # Secrets — set the values in the Render dashboard (sync:false keeps them out of git):
      - key: MONDAY_API_TOKEN
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

  # Nightly monday -> Postgres sync (the dashboard reads from Postgres, not live monday).
  - type: cron
    name: impact-monday-sync
    runtime: node
    region: oregon
    plan: starter
    branch: main
    schedule: "0 7 * * *"
    buildCommand: npm install
    startCommand: npm run sync
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: impact-portal-db
          property: connectionString
      - key: MONDAY_API_TOKEN
        sync: false
